<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VDI Mirror</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

  <div class="shell">

    <!-- ════════════════════════════════════════════════════
         CHROME — top navigation rail
    ════════════════════════════════════════════════════ -->
    <header class="chrome">

      <!-- Left: wordmark -->
      <div class="chrome__brand">
        <div class="chrome__mark">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="1" width="6" height="6" rx="1" fill="currentColor" opacity="0.9"/>
            <rect x="9" y="1" width="6" height="6" rx="1" fill="currentColor" opacity="0.5"/>
            <rect x="1" y="9" width="6" height="6" rx="1" fill="currentColor" opacity="0.5"/>
            <rect x="9" y="9" width="6" height="6" rx="1" fill="currentColor" opacity="0.25"/>
          </svg>
        </div>
        <span class="chrome__wordmark">VDI Mirror</span>
        <span class="chrome__rule"></span>
        <span class="chrome__caption">Remote Desktop Relay</span>
      </div>

      <!-- Center: session identity -->
      <div class="chrome__session">
        <div class="chrome__session-dot" id="session-dot"></div>
        <span class="chrome__session-text" id="session">No active session</span>
      </div>

      <!-- Right: status -->
      <div class="chrome__right">
        <div class="status-chip" id="status" data-ok="false">
          <span class="status-chip__ring"></span>
          <span class="status-chip__label">Disconnected</span>
        </div>
      </div>

    </header>

    <!-- ════════════════════════════════════════════════════
         ACTIONBAR — controls
    ════════════════════════════════════════════════════ -->
    <div class="actionbar">
      <div class="actionbar__group">

        <button class="btn btn--connect" id="connect" aria-label="Connect to remote session">
          <svg class="btn__icon" width="12" height="12" viewBox="0 0 12 12" fill="none">
            <circle cx="6" cy="6" r="2" fill="currentColor"/>
            <path d="M1.5 6a4.5 4.5 0 0 1 4.5-4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M10.5 6a4.5 4.5 0 0 1-4.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Connect
        </button>

        <div class="btn-divider"></div>

        <button class="btn btn--disconnect" id="disconnect" aria-label="Disconnect session">
          <svg class="btn__icon" width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Disconnect
        </button>

      </div>

      <div class="actionbar__meta">
        <span class="meta-tag">guacd</span>
        <span class="meta-sep">/</span>
        <span class="meta-tag">WebSocket</span>
        <span class="meta-sep">/</span>
        <span class="meta-tag">RDP</span>
      </div>
    </div>

    <!-- ════════════════════════════════════════════════════
         VIEWPORT — remote display canvas
    ════════════════════════════════════════════════════ -->
    <main class="viewport" id="viewport">

      <!-- Idle state — shown before first connection -->
      <div class="idle-state" id="placeholder">
        <div class="idle-state__glyph">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <rect x="4" y="6" width="32" height="22" rx="3" stroke="currentColor" stroke-width="1.5"/>
            <path d="M13 34h14M20 28v6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M14 17l4 4 8-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
          </svg>
        </div>
        <p class="idle-state__heading">No Session Active</p>
        <p class="idle-state__body">
          Press <kbd>Connect</kbd> to initiate the remote desktop stream
        </p>
      </div>

      <!-- Guacamole mounts its display element here -->
      <div class="rdp-surface" id="display"></div>

    </main>

    <!-- ════════════════════════════════════════════════════
         FOOTER — system information rail
    ════════════════════════════════════════════════════ -->
    <footer class="infobar">
      <div class="infobar__left">
        <span class="infobar__item">
          <span class="infobar__key">Transport</span>
          <span class="infobar__val">guacd 4822 / WebSocket</span>
        </span>
        <span class="infobar__divider"></span>
        <span class="infobar__item">
          <span class="infobar__key">Protocol</span>
          <span class="infobar__val" id="sb-protocol">RDP</span>
        </span>
      </div>
      <div class="infobar__right">
        <span class="infobar__item">
          <span class="infobar__key">VDI Mirror</span>
          <span class="infobar__val">1.0.0</span>
        </span>
      </div>
    </footer>

  </div>

  <script>var module = { exports: {} };</script>
  <script src="/static/guacamole-common-js.min.js"></script>
  <script src="/static/app.js"></script>

</body>
</html>
